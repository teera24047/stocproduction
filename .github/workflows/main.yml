name: CI/CD Pipeline - Stocproduction

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stocproduction-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./inventory-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stocproduction-frontend:latest

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Scan Images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/stocproduction-backend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'